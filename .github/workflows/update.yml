name: Atualizar Dados da Guild

on:
  schedule:
    # Roda todo dia às 12:00 UTC (09:00 Brasília)
    # Para mudar o horário: https://crontab.guru
    - cron: '0 12 * * *'
  workflow_dispatch: # Permite rodar manualmente pelo GitHub

permissions:
  contents: write

jobs:
  update-guild:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests beautifulsoup4

      - name: Rodar scraper
        run: python scraper.py

      - name: Salvar dados atualizados no repositório
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add guild_data.json
          git diff --staged --quiet || git commit -m "🔄 Dados da guild atualizados - $(date -u '+%d/%m/%Y %H:%M UTC')"
          git push
