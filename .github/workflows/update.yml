name: Atualizar Dados da Guild

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-guild:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4.2.2

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests beautifulsoup4

      - name: Salvar HTML bruto do site (diagnóstico)
        run: |
          curl -s -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124.0.0.0 Safari/537.36" \
            "https://amonot.online/guilds?name=Lowly+People" \
            -o debug_page.html
          echo "=== Primeiras 100 linhas do HTML recebido ==="
          head -n 100 debug_page.html

      - name: Rodar scraper
        run: python scraper.py

      - name: Mostrar resultado do scraper
        run: |
          python3 -c "
          import json
          d=json.load(open('guild_data.json'))
          print(f'Total: {d[\"total_members\"]}')
          print(f'Online: {d[\"online_count\"]}')
          print(f'Atualizado: {d[\"updated_at\"]}')
          "

      - name: Salvar arquivos no repositório
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add guild_data.json debug_page.html
          git diff --staged --quiet || git commit -m "🔄 Guild atualizada - $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M') (Brasília)"
          git push
