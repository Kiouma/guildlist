name: Atualizar Dados da Guild

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-guild:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests beautifulsoup4 urllib3

      - name: Rodar scraper
        run: python scraper.py

      - name: Verificar guild_data.json
        run: |
          echo "=== Resultado ==="
          python3 -c "
          import json, sys
          try:
            d = json.load(open('guild_data.json'))
            print(f'Total: {d[\"total_members\"]}')
            print(f'Online: {d[\"online_count\"]}')
            print(f'Offline: {d[\"offline_count\"]}')
            print(f'Atualizado: {d[\"updated_at\"]}')
            print(f'War LP kills: {d.get(\"war\",{}).get(\"lp_kills_total\",0)}')
            print(f'Resets hoje: {len(d.get(\"resets_today\",[]))}')
          except Exception as e:
            print(f'ERRO: {e}')
            sys.exit(1)
          "

      - name: Salvar no repositório
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add guild_data.json
          git diff --staged --quiet && echo "Sem mudancas" || (
            git commit -m "🔄 Guild atualizada - $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M') (Brasília)" &&
            git push
          )
