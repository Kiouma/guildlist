name: Atualizar Dados da Guild

on:
  schedule:
    # Roda a cada hora (minuto 0 de cada hora)
    - cron: '0 * * * *'
  workflow_dispatch: # Permite rodar manualmente

permissions:
  contents: write

jobs:
  update-guild:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests beautifulsoup4

      - name: Rodar scraper
        run: python scraper.py

      - name: Mostrar conteúdo do guild_data.json gerado
        run: |
          echo "=== guild_data.json ==="
          cat guild_data.json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          print(f'Total de membros: {d[\"total_members\"]}')
          print(f'Online: {d[\"online_count\"]}')
          print(f'Atualizado: {d[\"updated_at\"]}')
          "

      - name: Salvar dados atualizados no repositório
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add guild_data.json
          # Adiciona debug_page.html se existir (ajuda no diagnóstico)
          git add debug_page.html 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🔄 Guild atualizada - $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M') (Brasília)"
          git push
